services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ikom_rental
      MYSQL_USER: ikom_user
      MYSQL_PASSWORD: ikom_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: mysql://ikom_user:ikom_password@db:3306/ikom_rental
      JWT_SECRET: your_jwt_secret_here
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - ./public/uploads:/app/public/uploads

volumes:
  db_data:
