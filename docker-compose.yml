services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ikom_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: ikom_user
      MYSQL_PASSWORD: ikom_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: mysql://ikom_user:ikom_password@db:3306/ikom_db
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    # Run migrations before starting the app
    command: >
      sh -c "npx prisma migrate deploy && node server.js"

volumes:
  mysql_data:
